# Canonical defaults. Per-env overlays (values-sandbox.yaml, values-staging.yaml,
# values-prod.yaml) override only what differs.

replicaCount: 2

image:
  repository: 537462380503.dkr.ecr.eu-west-1.amazonaws.com/doc-uploader-sandbox/zip-extraction
  tag: "0.1.0"
  digest: ""              # REQUIRED in per-env overlay — sha256:...
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: zip-extraction
  roleArn: ""             # REQUIRED in per-env overlay — IRSA role ARN

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 96Mi
  limits:
    memory: 128Mi          # NFR-Z-003 — no CPU limit per Go-on-K8s convention

terminationGracePeriodSeconds: 270

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

volumes:
  tmp:
    enabled: true
    medium: ""             # set "Memory" for tmpfs

probes:
  liveness:
    path: /healthz/live
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /healthz/ready
    port: 8080
    initialDelaySeconds: 2
    periodSeconds: 5
    failureThreshold: 3

# Per-env infrastructure references — REQUIRED in per-env overlays.
infra:
  region: eu-west-1
  awsEndpointUrl: ""
  queueUrl: ""
  stagingBucket: ""
  dynamoTable: pipeline_files

sse:
  mode: "SSE-S3"           # "SSE-S3" | "SSE-KMS"
  kmsKeyId: ""             # populated only when mode == "SSE-KMS"

logging:
  format: json             # "json" | "console"
  level: info

bombDefence:
  maxCompressedSizeBytes:     524288000
  maxExtractedSizeBytes:      2147483648
  maxCompressionRatio:        1000     # bumped from 100: legacy Office docs (.doc OLE2) commonly compress 100-300x; real bombs are 1000x+
  maxEntryCount:              10000
  maxDirectoryDepth:          10
  maxSingleFileSizeBytes:     262144000
  maxExtractionDurationSec:   240

streaming:
  maxInMemoryBufferBytes:     4194304
  multipartThresholdBytes:    5242880

retry:
  maxAttempts:                3
  backoffBaseMillis:          200
  backoffFactor:              2.0
  jitterFraction:             0.25

sqs:
  heartbeatIntervalSec:       30
  maxInFlight:                5
  gracefulShutdownTimeoutSec: 250
  visibilityTimeoutSec:       300

http:
  port:                       8080
