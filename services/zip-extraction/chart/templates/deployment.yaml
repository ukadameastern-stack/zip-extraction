apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zip-extraction.fullname" . }}
  labels: {{- include "zip-extraction.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "zip-extraction.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels: {{- include "zip-extraction.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "zip-extraction.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: zip-extraction
          image: {{ include "zip-extraction.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: AWS_REGION
              value: {{ .Values.infra.region | quote }}
            - name: AWS_ENDPOINT_URL
              value: {{ .Values.infra.awsEndpointUrl | quote }}
            - name: QUEUE_URL
              value: {{ .Values.infra.queueUrl | quote }}
            - name: STAGING_BUCKET
              value: {{ .Values.infra.stagingBucket | quote }}
            - name: DYNAMO_TABLE
              value: {{ .Values.infra.dynamoTable | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logging.format | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: HTTP_PORT
              value: {{ .Values.http.port | quote }}
            - name: SSE_MODE
              value: {{ .Values.sse.mode | quote }}
            {{- if eq .Values.sse.mode "SSE-KMS" }}
            - name: SSE_KMS_KEY_ID
              value: {{ .Values.sse.kmsKeyId | quote }}
            {{- end }}
            - name: CONFIG_PATH
              value: /etc/zip-extraction/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.http.port }}
              protocol: TCP
          resources: {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/zip-extraction
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            {{- if .Values.volumes.tmp.medium }}
            medium: {{ .Values.volumes.tmp.medium | quote }}
            {{- end }}
        - name: config
          configMap:
            name: {{ include "zip-extraction.fullname" . }}-config
