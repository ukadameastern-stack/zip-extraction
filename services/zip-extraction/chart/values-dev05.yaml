# DEV05 overlay (account 537462380503, region eu-west-1, cluster DEV05-EKS-CLUSTER).
#
# Most fields here are static; the dynamic ones (image.tag, image.digest,
# serviceAccount.roleArn, infra.queueUrl, infra.stagingBucket, infra.dynamoTable)
# are injected from deploy/dev05/state.json via --set when helm-deploy.sh runs.
#
# DO NOT edit this file with real resource ARNs/URLs — they live in state.json
# so teardown stays authoritative.

image:
  pullPolicy: IfNotPresent
  # tag + digest set at deploy time

serviceAccount:
  create: true
  name: zip-extraction
  # roleArn set at deploy time from IAM role created by bootstrap-aws.sh

infra:
  region: eu-west-1
  awsEndpointUrl: ""   # real AWS, not LocalStack
  # queueUrl + stagingBucket + dynamoTable set at deploy time

sse:
  mode: "SSE-S3"        # DEV05 keeps S3-managed keys; no KMS to avoid cross-team permission setup

# Per-child classification hop wired to the in-cluster classification-ui
# Service in namespace classification-service-sandbox (see classification
# service deploy). Avoids the public ALB + IP allowlist + TLS overhead.
# Empty `defaultWorkspace` means we rely on the inbound ClaimCheck.tenantId.
classification:
  url: "http://classification-ui.classification-service-sandbox.svc.cluster.local"
  timeoutSec: 30
  defaultWorkspace: "wks-ui-001"

logging:
  format: json
  level: debug

# Single replica for an isolated dev environment.
replicaCount: 1
resources:
  requests:
    cpu: 100m
    memory: 96Mi
  limits:
    memory: 128Mi

# DEV05 enables the developer harness behind an IP-allowlisted public ALB.
harness:
  enabled: true
  # image.repository / .tag / .digest set at deploy time from state.json
  # sourceBucket set at deploy time from state.json (the uploads bucket)
  ingress:
    enabled: true
    host: "zip-extraction-dev-sandbox-v1.dev05.k8s.opus2dev.com"
    # 4 new IPs + the 10 existing CIDRs from the ArgoCD ingress allowlist.
    inboundCidrs: "213.210.23.82/32,213.210.23.84/32,31.121.79.58/32,31.121.79.60/32,18.133.115.188/32,54.91.4.210/32,18.168.253.57/32,52.74.117.130/32,165.65.37.128/29,136.40.11.230/32,114.143.153.146/32,114.143.153.147/32,103.68.11.58/32,103.68.11.59/32"
    albTags: "env=dev05,component=zip-extraction-harness,managed-by=helm"
